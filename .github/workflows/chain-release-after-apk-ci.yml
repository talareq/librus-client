# Łańcuch (opcjonalny): po udanym „Build Android APK” na domyślnej gałęzi, jeśli commit
# lub powiązany PR zawiera [publish-apk] w treści commita / tytule lub opisie PR,
# uruchamia „Release debug APK” dla wersji z package.json z tego SHA.
# Następnie: opublikowanie release → bump-version-after-release (package.json + iOS).
#
# Użycie: [publish-apk] w treści merge/squasha albo w PR (tytuł lub opis);
# version w package.json musi być tym, który chcesz wydać. Nie dodawaj znacznika
# przy każdym merge — tylko gdy celowo wydajesz APK pod /releases/latest/download/…

name: Chain release after APK CI

on:
  workflow_run:
    workflows: ["Build Android APK"]
    types: [completed]

permissions:
  contents: read
  actions: write
  pull-requests: read

jobs:
  dispatch-release:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - name: Sprawdź znacznik i wywołaj Release debug APK
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const sha = run.head_sha;
            const { owner, repo } = context.repo;

            const { data: commit } = await github.rest.repos.getCommit({
              owner, repo, ref: sha,
            });
            const message = commit.commit.message || "";

            let publish = message.includes("[publish-apk]");
            if (!publish) {
              try {
                const { data: prs } =
                  await github.rest.repos.listPullRequestsAssociatedWithCommit({
                    owner,
                    repo,
                    commit_sha: sha,
                  });
                for (const pr of prs) {
                  const blob = `${pr.title || ""}\n${pr.body || ""}`;
                  if (blob.includes("[publish-apk]")) {
                    publish = true;
                    core.notice(
                      `Znaleziono [publish-apk] w PR #${pr.number} (tytuł/opis) — kontynuuję release.`
                    );
                    break;
                  }
                }
              } catch (e) {
                core.warning(
                  `Nie udało się sprawdzić PR powiązanych z commitem (uprawnienia/API): ${e}`
                );
              }
            }

            if (!publish) {
              core.notice(
                "Pominięto release: dodaj [publish-apk] w wiadomości commita merge/squasha " +
                  "albo w tytule/opisie powiązanego PR. Alternatywa: Actions → „Release debug APK” → Run workflow."
              );
              return;
            }

            const { data: blob } = await github.rest.repos.getContent({
              owner, repo, path: "package.json", ref: sha,
            });
            if (!("content" in blob) || blob.encoding !== "base64") {
              core.setFailed("Nie można odczytać package.json z tego commita.");
              return;
            }
            const raw = Buffer.from(blob.content, "base64").toString("utf8");
            const version = JSON.parse(raw).version;
            if (!version || typeof version !== "string") {
              core.setFailed("Brak pola version w package.json.");
              return;
            }

            // createWorkflowDispatch: pole ref musi być gałęzią lub tagiem (nie samym SHA).
            const branch = run.head_branch;
            if (!branch) {
              core.setFailed("Brak head_branch w workflow_run — nie można wywołać release.");
              return;
            }
            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: "release-apk.yml",
              ref: branch,
              inputs: { version, commit_sha: sha },
            });
            core.notice(
              `Wywołano release-apk.yml dla wersji ${version} (branch ${branch}, commit ${sha.slice(0, 7)})`
            );
