# Buduje debug APK i dołącza do GitHub Release pod tagiem semver (np. v0.1.0).
# Zasób ma stałą nazwę librus-client.apk → adres:
# https://github.com/<owner>/<repo>/releases/latest/download/librus-client.apk
# Uwaga: „latest” = ostatnie **opublikowane** release (tag), nie zawsze to samo co wersja
# na gałęzi main (po „Bump version after release” na main bywa nowszy numer niż ostatni tag).
# Poprawny URL: .../download/librus-client.apk (ukośnik po „download”, nie kropka).
# (działa dopiero gdy istnieje co najmniej jedno opublikowane release).
#
# Sposoby uruchomienia:
# - Ręcznie: Actions → „Release debug APK” → Run workflow (pole = version z package.json, bez „v”).
# - Z CLI: ustaw version w package.json, commit, potem git tag v0.1.0 && git push origin v0.1.0

name: Release debug APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver zgodny z package.json (np. 0.1.0), bez prefiksu v"
        required: true
        type: string
      commit_sha:
        description: "Opcjonalnie: pełny SHA commita (łańcuch CI); puste = HEAD wybranej gałęzi"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # workflow_dispatch: API wymaga ref=branch/tag — dokładny commit z łańcucha przekazujemy tutaj.
          ref: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.commit_sha != '') && github.event.inputs.commit_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install dependencies
        run: npm ci

      - name: Ustal tag release
        id: rel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
            V="${V#v}"
            PJ=$(node -p "require('./package.json').version")
            if [ "$V" != "$PJ" ]; then
              echo "::error::Wersja z inputu ($V) musi być równa package.json ($PJ)."
              exit 1
            fi
            echo "tag=v${V}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Wersjonowanie (CI)
        run: |
          V=$(node -p "require('./package.json').version")
          echo "ANDROID_VERSION_NAME=$V" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_CODE=$((100000 + ${{ github.run_number }}))" >> "$GITHUB_ENV"

      - name: Build web assets
        run: npm run build

      - name: Capacitor sync (Android)
        run: npx cap sync android

      - name: Gradle assembleDebug
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Prepare asset (stała nazwa dla /releases/latest/download/…)
        run: cp android/app/build/outputs/apk/debug/app-debug.apk librus-client.apk

      - name: GitHub Release + APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: ${{ steps.rel.outputs.tag }}
          draft: false
          prerelease: false
          make_latest: true
          files: librus-client.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
