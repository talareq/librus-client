# Wykonuje zapytanie HTTP do wybranego adresu (np. webhook backendu, health check).
# Uruchomienie: Actions → „HTTP ping” → Run workflow.
#
# Konfiguracja:
#   Repository → Settings → Secrets and variables → Actions
#   - PING_URL          → pełny URL (np. https://twoj-vps/v1/wake lub /health)
#   - LIBRUS_WAKE_BEARER → ten sam sekret co API_SECRET na backendzie (Authorization: Bearer …)
# Opcjonalnie:
#   - PING_HEADERS      → dodatkowe nagłówki (bez Authorization — to dodaje LIBRUS_WAKE_BEARER)
#
# Uwaga: To nie „budzi” aplikacji na telefonie — tylko wywołuje serwer w internecie.
# Aby dotrzeć do urządzenia, backend musi np. wysłać FCM po takim wywołaniu.
#
# Dla backendu wake (`POST /v1/wake`): PING_URL + LIBRUS_WAKE_BEARER (+ opcjonalnie PING_HEADERS).
# Harmonogram `schedule` zawsze używa POST (patrz krok „HTTP request”).

name: HTTP ping

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Opcjonalny URL (pusty = użyj sekretu PING_URL)"
        required: false
        default: ""
      method:
        description: "HTTP method"
        type: choice
        options:
          - GET
          - HEAD
          - POST
        default: GET
  schedule:
    # UTC: 06:00, 13:00, 18:00 — w PL zimą to ~07:00 / 14:00 / 19:00, latem ~08:00 / 15:00 / 20:00 (CET/CEST)
    - cron: "0 6,13,18 * * *"

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve URL
        id: target
        run: |
          MANUAL="${{ github.event.inputs.url }}"
          SECRET_URL="${{ secrets.PING_URL }}"
          if [ -n "$MANUAL" ]; then
            echo "url=$MANUAL" >> "$GITHUB_OUTPUT"
          elif [ -n "$SECRET_URL" ]; then
            echo "url=$SECRET_URL" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Ustaw sekret PING_URL albo podaj URL przy ręcznym uruchomieniu."
            exit 1
          fi

      - name: HTTP request
        env:
          # Ręczne uruchomienie: wybrana metoda. Cron (schedule): zawsze POST — pod typowe POST /v1/wake.
          METHOD: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.method || 'POST' }}
          LIBRUS_WAKE_BEARER: ${{ secrets.LIBRUS_WAKE_BEARER }}
          PING_HEADERS: ${{ secrets.PING_HEADERS }}
        run: |
          set -euo pipefail
          URL="${{ steps.target.outputs.url }}"
          EXTRA=()
          if [ -n "${LIBRUS_WAKE_BEARER:-}" ]; then
            EXTRA+=(-H "Authorization: Bearer $LIBRUS_WAKE_BEARER")
          fi
          if [ -n "${PING_HEADERS:-}" ]; then
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              EXTRA+=(-H "$line")
            done <<< "$PING_HEADERS"
          fi
          echo "Request: $METHOD $URL"
          curl -fsS --max-time 60 -X "$METHOD" "${EXTRA[@]}" \
            -D - -o /tmp/ping-body \
            "$URL"
          echo "--- body (first 2KB) ---"
          head -c 2048 /tmp/ping-body || true
          echo ""
